name: Supabase Keep-Alive

# Empêche la mise en pause automatique du projet Supabase Free (pause
# après 7 jours SANS ACTIVITÉ BASE DE DONNÉES).
#
# ⚠️ Le timer d'inactivité se base sur l'activité BASE, pas sur les hits
# du gateway REST/Auth. Une simple lecture (`select`) ne suffit PAS : le
# job a renvoyé HTTP 200 dix jours d'affilée et le mail de pause est
# quand même arrivé. On déclenche donc une vraie ÉCRITURE via la RPC
# `keepalive()` (UPSERT d'une ligne unique). Voir la migration
# supabase/migrations/20260527000000_keepalive.sql.
#
# Note : `apikey` ci-dessous = clé *publishable / anon*, publique par
# design (déjà dans le bundle front et HANDOFF.md). PAS un secret. Si
# elle est rotée, définir la variable de dépôt `SUPABASE_ANON_KEY`.

on:
  schedule:
    # Deux fois par jour (07:13 et 19:13 UTC). GitHub retarde / ignore
    # parfois les jobs cron sous charge ; deux passages quotidiens
    # garantissent au moins une écriture par jour dans la fenêtre 7j.
    - cron: "13 7 * * *"
    - cron: "13 19 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    name: Heartbeat Supabase (ecriture RPC)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: "https://nunglkeqekxzpmushxty.supabase.co"
      SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || 'sb_publishable_XHasVadnhVZMoispGMq3aA_GdZEs8xy' }}
    steps:
      - name: Heartbeat, ecriture reelle via RPC keepalive()
        run: |
          set -euo pipefail
          code=$(curl -s -o /tmp/rpc.json -w "%{http_code}" \
            --max-time 30 --retry 3 --retry-delay 10 --retry-all-errors \
            -X POST "$SUPABASE_URL/rest/v1/rpc/keepalive" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "RPC keepalive() HTTP $code"
          cat /tmp/rpc.json || true
          echo
          if [ "$code" = "404" ]; then
            echo "::error::RPC keepalive() introuvable (404). Appliquer la migration supabase/migrations/20260527000000_keepalive.sql dans le SQL Editor, puis relancer."
            exit 1
          fi
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::RPC keepalive() a repondu $code (attendu 2xx), la base est peut-etre en pause."
            exit 1
          fi

      - name: Healthcheck Auth (GoTrue)
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 3 --retry-delay 10 --retry-all-errors \
            "$SUPABASE_URL/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "Auth health HTTP $code"
          if [ "$code" -ne 200 ]; then
            echo "::error::Auth health a repondu $code (attendu 200)."
            exit 1
          fi

      - name: Resume
        run: |
          echo "Ecriture heartbeat OK : timer d'inactivite reinitialise ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))."
